services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: factelec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
