name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - run: pnpm install --frozen-lockfile
      # `pnpm audit` interroge l'ancien endpoint npm /-/npm/v1/security/audits,
      # retiré par npm (4xx systématique, outil cassé — pas nos dépendances).
      # On interroge donc directement le nouvel endpoint officiel utilisé par
      # npm (bulk advisories) via scripts/audit.mjs. 0 vulnérabilité exigé
      # (toutes sévérités) sur l'arbre résolu (overrides pnpm compris).
      - run: pnpm run audit:ci
      - run: pnpm outdated -r    # échoue si une dépendance n'est pas en dernière stable
      - run: pnpm lint
      - run: pnpm build        # invoice-core (tsc) → apps/api (swc) → apps/web (next build), ordre topologique pnpm
      - run: pnpm typecheck     # apps/api tsgo ; apps/web repli typescript 5.9.x local (next build fait autorité sur les types de routes)
      - run: pnpm test          # invoice-core + apps/api (Docker/Testcontainers) + apps/web (jsdom, sans Docker)
