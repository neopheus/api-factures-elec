name: PDF/A-3 conformance (veraPDF, optional)

# Vérification formelle de la conformité PDF/A-3 du Factur-X produit par
# generateFacturX, via veraPDF (Java, GPLv3+/MPLv2+). Aucun validateur PDF/A
# pur JS n'existe : cette étape est déportée hors de la suite Node principale
# (ci.yml), déclenchée manuellement, et non bloquante (continue-on-error).
on:
  workflow_dispatch:

jobs:
  verapdf:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @factelec/invoice-core build

      - name: Générer un PDF Factur-X de fixture
        run: |
          node --input-type=module -e "
            import { writeFileSync } from 'node:fs';
            import { buildInvoice, generateFacturX } from './packages/invoice-core/dist/index.js';
            const invoice = buildInvoice({
              number: 'FA-2026-001',
              issueDate: '2026-07-12',
              dueDate: '2026-08-11',
              typeCode: '380',
              currency: 'EUR',
              businessProcessType: 'S1',
              seller: {
                name: 'AV Digital',
                siren: '123456789',
                vatId: 'FR32123456789',
                address: { streetName: '1 rue de la Paix', city: 'Paris', postalCode: '75002', countryCode: 'FR' },
              },
              buyer: {
                name: 'Client SARL',
                siren: '987654321',
                vatId: 'FR40987654321',
                address: { streetName: '5 avenue des Champs', city: 'Lyon', postalCode: '69001', countryCode: 'FR' },
              },
              lines: [{ id: '1', name: 'Prestation de développement', quantity: '1', unitCode: 'C62', unitPrice: '1000.00', vatCategory: 'S', vatRate: '20.00' }],
            });
            const pdf = await generateFacturX(invoice);
            writeFileSync('facturx-fixture.pdf', pdf);
          "

      - name: veraPDF (profil PDF/A-3B)
        run: |
          mkdir -p verapdf-report
          docker run --rm \
            -v "$PWD:/data" \
            verapdf/verapdf \
            --flavour 3b --format text \
            "/data/facturx-fixture.pdf" > verapdf-report/report.txt || true
          cat verapdf-report/report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: verapdf-report
          path: verapdf-report/report.txt
