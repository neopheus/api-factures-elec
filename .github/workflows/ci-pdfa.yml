name: PDF/A-3 conformance (veraPDF, optional)

# Vérification formelle de la conformité PDF/A-3 du Factur-X produit par
# generateFacturX, via veraPDF (Java, GPLv3+/MPLv2+). Aucun validateur PDF/A
# pur JS n'existe : cette étape est déportée hors de la suite Node principale
# (ci.yml), non bloquante (continue-on-error). Déclenchée manuellement
# (workflow_dispatch) et automatiquement sur push touchant la génération
# Factur-X/CII embarqué (le job reste non bloquant : un échec ne bloque pas
# la CI principale).
on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/invoice-core/src/facturx/**'
      - 'packages/invoice-core/src/cii/**'

jobs:
  verapdf:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      # Action tierce épinglée au SHA de commit (immutabilité supply-chain,
      # règle semgrep third-party-action-not-pinned) — SHA = tag v6.0.9.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @factelec/invoice-core build

      - name: Générer un PDF Factur-X de fixture
        run: |
          node --input-type=module -e "
            import { writeFileSync } from 'node:fs';
            import { buildInvoice, generateFacturX } from './packages/invoice-core/dist/index.js';
            const invoice = buildInvoice({
              number: 'FA-2026-001',
              issueDate: '2026-07-12',
              dueDate: '2026-08-11',
              typeCode: '380',
              currency: 'EUR',
              businessProcessType: 'S1',
              seller: {
                name: 'AV Digital',
                siren: '123456789',
                vatId: 'FR32123456789',
                address: { streetName: '1 rue de la Paix', city: 'Paris', postalCode: '75002', countryCode: 'FR' },
              },
              buyer: {
                name: 'Client SARL',
                siren: '987654321',
                vatId: 'FR40987654321',
                address: { streetName: '5 avenue des Champs', city: 'Lyon', postalCode: '69001', countryCode: 'FR' },
              },
              lines: [{ id: '1', name: 'Prestation de développement', quantity: '1', unitCode: 'C62', unitPrice: '1000.00', vatCategory: 'S', vatRate: '20.00' }],
            });
            const pdf = await generateFacturX(invoice);
            writeFileSync('facturx-fixture.pdf', pdf);
          "

      - name: veraPDF (profil PDF/A-3B)
        # verapdf/verapdf n'existe pas sur Docker Hub (image inexistante,
        # constaté en local : pull access denied). verapdf/cli est l'image
        # officielle du consortium veraPDF portant ce CLI.
        run: |
          mkdir -p verapdf-report
          docker run --rm \
            -v "$PWD:/data" \
            verapdf/cli \
            --flavour 3b --format text \
            "/data/facturx-fixture.pdf" > verapdf-report/report.txt || true
          cat verapdf-report/report.txt

      - uses: actions/upload-artifact@v7
        with:
          name: verapdf-report
          path: verapdf-report/report.txt
