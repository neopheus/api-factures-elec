name: CI PHP (connecteurs PrestaShop / WooCommerce)
on:
  push:
    branches: [main]
    paths:
      - 'connectors/**'
  pull_request:
    paths:
      - 'connectors/**'
jobs:
  # Job séparé (brief) : n'affecte pas la CI TS existante (ci.yml). Paths
  # élargis à connectors/** (phase 4 it.2) : chaque job garde son propre
  # working-directory, donc un changement dans un seul connecteur déclenche
  # bien les DEUX paires de jobs (GitHub Actions n'a pas de filtrage par job
  # à partir des paths du workflow), mais chaque job reste rapide et isolé.
  php:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connectors/prestashop
    steps:
      - uses: actions/checkout@v7
      # Action tierce épinglée au SHA de commit (immutabilité supply-chain,
      # règle semgrep third-party-action-not-pinned — même motif que
      # pnpm/action-setup dans ci.yml) — SHA = tag v2 courant (2.37.2),
      # résolu via `gh api repos/shivammathur/setup-php/git/refs/tags/2.37.2`.
      #
      # PHP 8.2 ici (outillage CI), PAS 8.1 : phpunit/phpunit ^11 (dev-dep
      # demandée) exige réellement PHP >=8.2 (vérifié en installant le
      # paquet localement) — incompatible avec le plancher `php >=8.1` du
      # MODULE (composer.json "require", cible réelle des boutiques
      # PrestaShop). phpstan.neon fixe `phpVersion: 80100` pour continuer à
      # vérifier que factelec/src/ reste un langage valide en 8.1 malgré un
      # interpréteur d'exécution plus récent ici.
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2 (2.37.2)
        with:
          php-version: '8.2'
          tools: composer
          coverage: none
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - run: vendor/bin/phpstan analyse
      - run: vendor/bin/phpunit

  # Job dédié, PHP 8.1 RÉEL (pas seulement `phpstan.neon` phpVersion: 80100,
  # qui ne vérifie que la compatibilité de LANGAGE sous un interpréteur plus
  # récent) — durcissement demandé en revue tâche 3/5 : le plancher déclaré
  # du module (composer.json "require": "php": ">=8.1") doit être vérifié
  # par un VRAI interpréteur 8.1, pas seulement inféré. `php -l` (lint de
  # syntaxe) suffit ici : aucune dépendance/autoload requis, juste analyser
  # `factelec/` (le code réellement expédié dans le zip — factelec.php +
  # src/), pas `tests/` (dev-only, jamais sous 8.1 en production).
  php-lint-81:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connectors/prestashop
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2 (2.37.2)
        with:
          php-version: '8.1'
          coverage: none
      - run: find factelec -name '*.php' -print0 | xargs -0 -n1 -I{} php -l {}

  # Connecteur WooCommerce (phase 4 it.2) — jobs parallèles aux jobs
  # PrestaShop ci-dessus, même steps, même setup-php SHA-pinné, seul le
  # working-directory change. Paquet Composer distinct
  # (connectors/woocommerce/), aucune dépendance croisée avec PrestaShop.
  woocommerce:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connectors/woocommerce
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2 (2.37.2)
        with:
          php-version: '8.2'
          tools: composer
          coverage: none
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - run: vendor/bin/phpstan analyse
      - run: vendor/bin/phpunit

  # PHP 8.1 RÉEL (pas seulement phpstan.neon phpVersion: 80100) — même motif
  # que php-lint-81 ci-dessus : le plancher déclaré du plugin (composer.json
  # "require": "php": ">=8.1") doit être vérifié par un VRAI interpréteur
  # 8.1. `factelec/` = le code réellement expédié dans le zip
  # (factelec.php + uninstall.php + src/), pas `tests/` (dev-only).
  woocommerce-php-lint-81:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connectors/woocommerce
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2 (2.37.2)
        with:
          php-version: '8.1'
          coverage: none
      - run: find factelec -name '*.php' -print0 | xargs -0 -n1 -I{} php -l {}
